name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend
      run: |
        docker build -t prashantyadav8814/backend:latest ./backend
        docker push prashantyadav8814/backend:latest

    - name: Build and Push Frontend
      run: |
        docker build -t prashantyadav8814/frontend:latest ./frontend
        docker push prashantyadav8814/frontend:latest

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      run: |
        az aks get-credentials --resource-group devops-rg --name devops-cluster --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/