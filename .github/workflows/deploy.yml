name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: prashantyadav8814

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 3: Build & Push Backend Image
    - name: Build Backend Image
      run: |
        docker build -t $DOCKER_USERNAME/backend:latest ./backend
        docker push $DOCKER_USERNAME/backend:latest

    # Step 4: Build & Push Frontend Image
    - name: Build Frontend Image
      run: |
        docker build -t $DOCKER_USERNAME/frontend:latest ./frontend
        docker push $DOCKER_USERNAME/frontend:latest

    # Step 5: Set up kubectl
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    # Step 6: Configure kubeconfig
    - name: Set kubeconfig
      uses: azure/aks-set-context@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        cluster-name: devops-cluster
        resource-group: devops-rg

    # Step 7: Deploy to AKS
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/backend backend=$DOCKER_USERNAME/backend:latest
        kubectl set image deployment/frontend frontend=$DOCKER_USERNAME/frontend:latest